<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindiba | Hatıra Defteri</title>

<style>
:root {
    --bg:#f8f9fa;
    --card:#fff;
    --text:#212529;
    --muted:#6c757d;
    --accent:#4f46e5;
    --border:#e5e7eb;
}

@media (prefers-color-scheme: dark) {
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --border:#334155;
}
}

*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

header{
    text-align:center;
    padding:3rem 1rem;
    background:var(--card);
    border-bottom:1px solid var(--border);
}

header h1{
    font-size:2.5rem;
    background:linear-gradient(90deg,var(--accent),#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.container{
    max-width:1100px;
    margin:2rem auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:2rem;
    padding:0 1rem;
}

.posts{
    display:flex;
    flex-direction:column;
    gap:1.5rem;
}

.post{
    background:var(--card);
    border:1px solid var(--border);
    padding:1.5rem;
    border-radius:12px;
}

.title{font-size:1.4rem;font-weight:bold;margin:0.5rem 0}
.excerpt{color:var(--muted);margin-bottom:1rem}

.btn{
    background:var(--accent);
    color:#fff;
    padding:0.5rem 1rem;
    border-radius:6px;
    text-decoration:none;
}

aside{
    display:flex;
    flex-direction:column;
    gap:1rem;
}

.box{
    background:var(--card);
    padding:1rem;
    border:1px solid var(--border);
    border-radius:12px;
}

.muted{color:var(--muted);font-size:0.9rem}
</style>
</head>

<body>

<header>
<h1>Hindiba 🌿</h1>
<p style="color:var(--muted)">Hatıra defteri</p>
</header>

<div class="container">

<main class="posts" id="posts"></main>

<aside>
<div class="box">
<h3>Hakkımda</h3>
<p class="muted">Burada yazılar paylaşıyorum.</p>
</div>

<div class="box">
<h3>Kategoriler</h3>
<p class="muted">Edebiyat / Şiir / Günlük</p>
</div>
</aside>

</div>

<script>
const username = "esakbas";
const repo = "esakbas.github.io";
const folder = "posts";

async function loadPosts(){

const url = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;
const res = await fetch(url);
const data = await res.json();

const container = document.getElementById("posts");

const posts = data.filter(f => f.name.endsWith(".md")).reverse();

for(const post of posts){

const md = await fetch(post.download_url).then(r => r.text());

const title = md.split("\n")[0].replace("#","").trim();
const excerpt = md.split("\n").slice(1,3).join(" ");

const card = document.createElement("div");
card.className = "post";

card.innerHTML = `
<div class="muted">📄 ${post.name}</div>
<div class="title">${title}</div>
<div class="excerpt">${excerpt}</div>
<a class="btn" href="post.html?file=${post.download_url}">Devamını Oku</a>
`;

container.appendChild(card);
}

}

loadPosts();
</script>

</body>
</html>
