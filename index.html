<!DOCTYPE html>
<html lang="tr" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindiba | Eşref Akbaş</title>
    <meta name="description" content="Eşref Akbaş'ın kişisel blogu — Edebiyat, şiir ve günlük yazıları">

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Hindiba | Eşref Akbaş">
    <meta property="og:description" content="Edebiyat, şiir ve günlük yazıları">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://esakbas.github.io">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Hindiba | Eşref Akbaş">
    <meta name="twitter:description" content="Edebiyat, şiir ve günlük yazıları">
    <meta name="twitter:site" content="@esrefakbs">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- marked.js — güvenli ve tam Markdown desteği -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

    <style>
        /* ─── TEMA DEĞİŞKENLERİ ─────────────────────────────── */
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --card-shadow: 0 20px 25px -12px rgba(0,0,0,0.08);
            --gradient-start: #4f46e5;
            --gradient-end: #ec4899;
        }

        [data-theme="dark"],
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg-color: #0f172a;
                --container-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-color: #6366f1;
                --accent-hover: #818cf8;
                --border-color: #334155;
                --gradient-start: #6366f1;
                --gradient-end: #f43f5e;
            }
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #818cf8;
            --border-color: #334155;
            --gradient-start: #6366f1;
            --gradient-end: #f43f5e;
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --card-shadow: 0 20px 25px -12px rgba(0,0,0,0.05);
            --gradient-start: #4f46e5;
            --gradient-end: #ec4899;
        }

        /* ─── RESET & BASE ───────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            padding-bottom: 3rem;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ─── HEADER ─────────────────────────────────────────── */
        header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute; inset: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.1)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            opacity: 0.3;
            pointer-events: none;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            color: white;
            position: relative;
            animation: fadeInDown 0.8s ease;
        }

        header p {
            color: rgba(255,255,255,0.9);
            font-style: italic;
            font-size: 1rem;
            position: relative;
            animation: fadeInUp 0.8s ease;
            margin-top: 0.5rem;
        }

        /* Karanlık/aydınlık mod toggle butonu */
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 38px; height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.2s;
            z-index: 10;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.35); transform: scale(1.1); }

        @keyframes fadeInDown { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeInUp   { from { opacity:0; transform:translateY(30px);  } to { opacity:1; transform:translateY(0); } }

        /* ─── LAYOUT ─────────────────────────────────────────── */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* ─── ARAMA & FİLTRE ─────────────────────────────────── */
        .search-box {
            position: relative;
            margin-bottom: 1rem;
        }
        .search-box i {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background-color: var(--container-bg);
            color: var(--text-main);
            font-size: 0.9rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }

        .category-filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-btn i { margin-right: 0.3rem; }
        .filter-btn:hover { border-color: var(--accent-color); color: var(--accent-color); transform: translateY(-2px); }
        .filter-btn.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border-color: transparent;
        }

        /* ─── POST KARTLARI ──────────────────────────────────── */
        .blog-posts { display: flex; flex-direction: column; gap: 1.5rem; }

        .post-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.8rem;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            cursor: pointer;
        }
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
            border-color: transparent;
        }
        .post-card:focus-within { outline: 2px solid var(--accent-color); outline-offset: 2px; }

        .post-category {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.25rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem; font-weight: 600;
            margin-bottom: 1rem;
        }
        .category-edebiyat  { background: linear-gradient(135deg,#8b5cf6,#7c3aed); color:white; }
        .category-siir      { background: linear-gradient(135deg,#ec4899,#db2777); color:white; }
        .category-gunluk    { background: linear-gradient(135deg,#10b981,#059669); color:white; }
        .category-bir-cumle { background: linear-gradient(135deg,#f59e0b,#d97706); color:white; }

        .post-title { font-size: 1.3rem; margin-bottom: 0.75rem; font-weight: 700; }
        .post-meta {
            font-size: 0.75rem; color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
        }
        .post-meta i { margin-right: 0.3rem; }
        .post-excerpt { color: var(--text-muted); margin-bottom: 1.2rem; font-size: 0.9rem; line-height: 1.6; }

        .read-more-btn {
            background: none; border: none;
            color: var(--accent-color);
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            display: inline-flex; align-items: center; gap: 0.3rem;
            transition: gap 0.2s;
            padding: 0;
        }
        .read-more-btn:hover { gap: 0.6rem; }
        .read-more-btn:focus { outline: 2px solid var(--accent-color); outline-offset: 2px; border-radius: 4px; }

        /* ─── SKELETON LOADER ────────────────────────────────── */
        .skeleton-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 1.8rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skeleton-title { height:24px; background:var(--border-color); border-radius:8px; margin-bottom:1rem; width:70%; }
        .skeleton-text  { height:14px; background:var(--border-color); border-radius:8px; margin-bottom:0.5rem; width:100%; }
        .skeleton-text.short { width:60%; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* ─── SİDEBAR ────────────────────────────────────────── */
        .sidebar-widget {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .sidebar-widget:hover { transform: translateY(-3px); box-shadow: var(--card-shadow); }

        .widget-title {
            font-weight: 700; margin-bottom: 1rem; font-size: 1.1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .widget-title i { color: var(--accent-color); }

        .profile-card {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .profile-img {
            width: 100px; height: 100px;
            border-radius: 50%; object-fit: cover;
            border: 3px solid var(--accent-color);
            transition: transform 0.3s; cursor: pointer;
            display: block; margin: 0 auto 1rem;
        }
        .profile-img:hover { transform: scale(1.05); }

        /* Fallback avatar — resim yüklenemezse görünür */
        .profile-avatar-fallback {
            display: none;
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white; font-size: 2rem; font-weight: 700;
            align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            border: 3px solid var(--accent-color);
        }

        .profile-name {
            font-size: 1.4rem; font-weight: 700; margin-bottom: 0.75rem;
            cursor: pointer; letter-spacing: 1px;
            display: block; width: 100%;
            transition: all 0.3s;
            background: none; border: none; color: var(--text-main);
        }
        .profile-name:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .profile-divider {
            width: 100px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            margin: 0.75rem auto; border-radius: 2px; display: block;
        }
        .profile-location {
            color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem;
            display: flex; align-items: center; justify-content: center; gap: 0.3rem;
        }

        .social-links {
            display: flex; gap: 1.2rem; justify-content: center; margin-top: 0;
        }
        .social-links a {
            color: var(--text-muted); font-size: 1.5rem;
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%;
            background-color: var(--bg-color); text-decoration: none;
            transition: all 0.3s;
        }
        .social-links a:hover { transform: translateY(-3px); }
        .social-links a:nth-child(1):hover { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color:white; }
        .social-links a:nth-child(2):hover { background: #000; color:white; }

        .sidebar-stats { list-style:none; font-size:0.85rem; }
        .sidebar-stats li { padding: 0.3rem 0; display:flex; align-items:center; gap:0.5rem; }
        .sidebar-stats i { color: var(--accent-color); width:16px; }
        .stat-value { font-weight: 600; margin-left: auto; color: var(--accent-color); }

        .popular-posts { list-style:none; }
        .popular-posts li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .popular-posts li:last-child { border-bottom: none; }
        .popular-posts li i { color: var(--accent-color); font-size: 0.8rem; flex-shrink:0; }
        .popular-posts li a {
            color: var(--text-main); text-decoration:none;
            font-size: 0.85rem; transition: color 0.2s;
        }
        .popular-posts li a:hover { color: var(--accent-color); }

        /* ─── OKUMA PROGRESS BARI ────────────────────────────── */
        .progress-bar-wrap {
            position: sticky; top: 0; left: 0;
            width: 100%; height: 3px;
            background: var(--border-color);
            z-index: 10; border-radius: 0 3px 3px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            width: 0%; transition: width 0.1s linear;
            border-radius: 0 3px 3px 0;
        }

        /* ─── MODAL ──────────────────────────────────────────── */
        .modal {
            display: none;
            position: fixed; z-index: 1000;
            inset: 0;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }
        .modal.open { display: block; }

        .modal-content {
            background-color: var(--container-bg);
            margin: 3rem auto;
            padding: 2rem;
            width: 90%; max-width: 800px;
            border-radius: 24px;
            position: relative;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

        .close-modal {
            position: absolute; right: 1.5rem; top: 1rem;
            font-size: 1.8rem; cursor: pointer; transition: transform 0.3s;
            color: var(--text-muted); background:none; border:none;
            line-height:1; padding: 0.25rem;
        }
        .close-modal:hover { transform: rotate(90deg); color: var(--text-main); }
        .close-modal:focus { outline: 2px solid var(--accent-color); border-radius: 4px; }

        /* Markdown içerik stili */
        .modal-body h1,.modal-body h2,.modal-body h3 { margin: 1.5rem 0 0.75rem; }
        .modal-body p  { margin-bottom: 1rem; line-height: 1.8; }
        .modal-body ul,.modal-body ol { margin: 0.75rem 0 1rem 1.5rem; }
        .modal-body li { margin-bottom: 0.3rem; }
        .modal-body blockquote {
            border-left: 4px solid var(--accent-color);
            padding: 0.5rem 1rem; margin: 1rem 0;
            color: var(--text-muted); font-style: italic;
            background: var(--bg-color); border-radius: 0 8px 8px 0;
        }
        .modal-body pre {
            background: var(--bg-color); padding: 1rem; border-radius: 8px;
            overflow-x: auto; margin: 1rem 0; font-size: 0.85rem;
        }
        .modal-body code { font-family: monospace; }
        .modal-body a { color: var(--accent-color); }
        .modal-body hr { border: none; border-top: 1px solid var(--border-color); margin: 1.5rem 0; }
        .modal-body img { max-width:100%; border-radius:8px; margin:1rem 0; }

        .modal-actions {
            display: flex; justify-content: center; gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .modal-actions button {
            padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer;
            border: none; font-size: 0.85rem; font-weight: 500;
            transition: opacity 0.2s, transform 0.2s;
        }
        .modal-actions button:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-share { background: #000; color: white; }
        .btn-copy  { background: var(--accent-color); color: white; }

        /* ─── BOŞ DURUM ──────────────────────────────────────── */
        .empty-state {
            text-align: center; padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; display:block; }

        /* ─── SCROLLBAR ──────────────────────────────────────── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        /* ─── RESPONSIVE ─────────────────────────────────────── */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            aside { order: -1; }
            .profile-card .profile-img, .profile-card .profile-avatar-fallback { width:80px; height:80px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

<header>
    <button class="theme-toggle" id="themeToggle" title="Tema değiştir" aria-label="Karanlık/aydınlık mod değiştir">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>
    <h1><i class="fas fa-feather-alt" aria-hidden="true"></i> Hindiba</h1>
    <p>Belki de şimdiye kadar ardından söylenebilecek en zarif benzetme "Hindiba" idi…</p>
</header>

<div class="container">
    <main id="main-content">
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search" aria-hidden="true"></i>
                <input type="search" id="searchInput" placeholder="Yazılarda ara… (başlık veya içerik)"
                       aria-label="Yazılarda ara">
            </div>
        </div>

        <div class="category-filters" role="group" aria-label="Kategori filtresi">
            <button class="filter-btn active" data-category="all"><i class="fas fa-globe" aria-hidden="true"></i> Tümü</button>
            <button class="filter-btn" data-category="edebiyat"><i class="fas fa-book" aria-hidden="true"></i> Edebiyat</button>
            <button class="filter-btn" data-category="siir"><i class="fas fa-feather-alt" aria-hidden="true"></i> Şiir</button>
            <button class="filter-btn" data-category="gunluk"><i class="fas fa-journal-whills" aria-hidden="true"></i> Günlük</button>
            <button class="filter-btn" data-category="bir-cumle"><i class="fas fa-quote-left" aria-hidden="true"></i> Bir Cümle</button>
        </div>

        <div class="blog-posts" id="posts" aria-live="polite" aria-label="Yazılar listesi">
            <div class="skeleton-card" aria-hidden="true"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
            <div class="skeleton-card" aria-hidden="true"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
        </div>
    </main>

    <aside aria-label="Yan panel">
        <!-- Profil -->
        <div class="sidebar-widget profile-card">
            <img src="pp.jpg" class="profile-img" alt="Eşref Akbaş profil fotoğrafı"
                 onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';">
            <div class="profile-avatar-fallback" id="avatarFallback" aria-hidden="true">EA</div>
            <span class="profile-name">Eşref Akbaş</span>
            <span class="profile-divider"></span>
            <div class="profile-location"><i class="fas fa-map-marker-alt" aria-hidden="true"></i> Van</div>
        </div>

        <!-- İstatistikler -->
        <div class="sidebar-widget">
            <div class="widget-title"><i class="fas fa-chart-line" aria-hidden="true"></i> İstatistikler</div>
            <ul class="sidebar-stats">
                <li><i class="fas fa-pen-fancy" aria-hidden="true"></i> Toplam Yazı <span class="stat-value" id="totalPosts">—</span></li>
                <li><i class="fas fa-tags" aria-hidden="true"></i> Kategori <span class="stat-value">4</span></li>
            </ul>
        </div>

        <!-- Kategoriler -->
        <div class="sidebar-widget">
            <div class="widget-title"><i class="fas fa-tags" aria-hidden="true"></i> Kategoriler</div>
            <ul class="sidebar-stats">
                <li><i class="fas fa-book" aria-hidden="true"></i> Edebiyat <span class="stat-value" id="cat-edebiyat-count">—</span></li>
                <li><i class="fas fa-feather-alt" aria-hidden="true"></i> Şiir <span class="stat-value" id="cat-siir-count">—</span></li>
                <li><i class="fas fa-journal-whills" aria-hidden="true"></i> Günlük <span class="stat-value" id="cat-gunluk-count">—</span></li>
                <li><i class="fas fa-quote-left" aria-hidden="true"></i> Bir Cümle <span class="stat-value" id="cat-bir-cumle-count">—</span></li>
            </ul>
        </div>

        <!-- Son Yazılar -->
        <div class="sidebar-widget">
            <div class="widget-title"><i class="fas fa-clock" aria-hidden="true"></i> Son Yazılar</div>
            <ul class="popular-posts" id="recentPosts">
                <li><i class="fas fa-spinner fa-spin" aria-hidden="true"></i> <span>Yükleniyor…</span></li>
            </ul>
        </div>

        <!-- Sosyal -->
        <div class="sidebar-widget">
            <div class="widget-title"><i class="fas fa-share-alt" aria-hidden="true"></i> Takip Et</div>
            <div class="social-links">
                <a href="https://www.instagram.com/esrefakbs" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <i class="fab fa-instagram" aria-hidden="true"></i>
                </a>
                <a href="https://x.com/esrefakbs" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)">
                    <i class="fab fa-twitter" aria-hidden="true"></i>
                </a>
            </div>
        </div>
    </aside>
</div>

<!-- Modal -->
<div id="postModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
        <div class="progress-bar-wrap" aria-hidden="true"><div class="progress-bar" id="readProgress"></div></div>
        <button class="close-modal" id="closeModal" aria-label="Kapat">&times;</button>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
/* ─── YAPILANDIRMA ──────────────────────────────────────── */
const REPO_OWNER = 'esakbas';
const REPO_NAME  = 'esakbas.github.io';
const CACHE_KEY  = 'hindiba_posts_v1';
const CACHE_TTL  = 10 * 60 * 1000; // 10 dakika

/* ─── DURUM ─────────────────────────────────────────────── */
let allPosts      = [];
let postMap       = new Map(); // ID → post nesnesi (XSS önlemi)
let currentFilter = 'all';
let currentSearch = '';
let searchTimer   = null;
let lastFocused   = null; // modal kapanınca focus geri dönecek

/* ─── TEMA ──────────────────────────────────────────────── */
(function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon();
})();

function updateThemeIcon() {
    const theme = document.documentElement.getAttribute('data-theme');
    const isDark = theme === 'dark' || (theme !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
    document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}

document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const isDark  = current === 'dark' || (current !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
    const next    = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
});

/* ─── YARDIMCI FONKSİYONLAR ─────────────────────────────── */
function calculateReadingTime(content) {
    const words = (content || '').split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.ceil(words / 200));
}

function formatDate(iso) {
    return new Date(iso).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
}

function getCategoryMeta(labelName) {
    const map = {
        'edebiyat':  { name:'Edebiyat', icon:'fa-book' },
        'siir':      { name:'Şiir',     icon:'fa-feather-alt' },
        'gunluk':    { name:'Günlük',   icon:'fa-journal-whills' },
        'bir-cumle': { name:'Bir Cümle',icon:'fa-quote-left' },
    };
    return map[labelName] || { name: labelName, icon:'fa-tag' };
}

/* Güvenli metin (innerHTML için değil, textContent için) */
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

/* ─── VERİ YÜKLEMELERİ ─────────────────────────────────── */
async function loadPosts() {
    // Önce cache'e bak
    try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (raw) {
            const { data, ts } = JSON.parse(raw);
            if (Date.now() - ts < CACHE_TTL) {
                processPosts(data);
                return;
            }
        }
    } catch (_) { /* cache bozuksa devam et */ }

    showSkeletons();

    try {
        const res = await fetch(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=all&per_page=100`,
            { headers: { 'Accept': 'application/vnd.github.v3+json' } }
        );

        if (!res.ok) throw new Error(`GitHub API hatası: ${res.status}`);

        const issues = await res.json();
        // Cache'e yaz
        localStorage.setItem(CACHE_KEY, JSON.stringify({ data: issues, ts: Date.now() }));
        processPosts(issues);
    } catch (err) {
        document.getElementById('posts').innerHTML = `
            <div class="post-card empty-state">
                <i class="fas fa-exclamation-circle"></i>
                <strong>Yazılar yüklenemedi</strong><br>
                <small>${escapeHtml(err.message)}</small>
            </div>`;
    }
}

function processPosts(issues) {
    allPosts = issues.filter(i => i.labels && i.labels.length > 0);

    // postMap doldur — onclick'te ID kullanmak için (XSS önlemi)
    postMap.clear();
    allPosts.forEach(p => postMap.set(p.id, p));

    updateSidebar();
    displayPosts();

    // URL'de #post-ID varsa doğrudan aç
    const hash = location.hash;
    if (hash.startsWith('#post-')) {
        const id = parseInt(hash.replace('#post-', ''), 10);
        const post = postMap.get(id);
        if (post) openModal(post);
    }
}

/* ─── SIDEBAR ───────────────────────────────────────────── */
function updateSidebar() {
    const counts = {
        edebiyat:    allPosts.filter(p => p.labels.some(l => l.name === 'edebiyat')).length,
        siir:        allPosts.filter(p => p.labels.some(l => l.name === 'siir')).length,
        gunluk:      allPosts.filter(p => p.labels.some(l => l.name === 'gunluk')).length,
        'bir-cumle': allPosts.filter(p => p.labels.some(l => l.name === 'bir-cumle')).length,
    };

    document.getElementById('totalPosts').textContent       = allPosts.length;
    document.getElementById('cat-edebiyat-count').textContent  = counts.edebiyat;
    document.getElementById('cat-siir-count').textContent      = counts.siir;
    document.getElementById('cat-gunluk-count').textContent    = counts.gunluk;
    document.getElementById('cat-bir-cumle-count').textContent = counts['bir-cumle'];

    const recent = [...allPosts]
        .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
        .slice(0, 5);

    const container = document.getElementById('recentPosts');
    if (!recent.length) {
        container.innerHTML = '<li><i class="fas fa-info-circle" aria-hidden="true"></i> <span>Henüz yazı yok</span></li>';
        return;
    }
    container.innerHTML = recent.map(post => `
        <li>
            <i class="fas fa-angle-right" aria-hidden="true"></i>
            <a href="#post-${post.id}" onclick="openModalById(${post.id}); return false;">
                ${escapeHtml(post.title)}
            </a>
        </li>`).join('');
}

/* ─── YAZILARI GÖSTER ───────────────────────────────────── */
function showSkeletons() {
    document.getElementById('posts').innerHTML = `
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>`;
}

function displayPosts() {
    const container = document.getElementById('posts');
    let filtered = allPosts;

    if (currentFilter !== 'all') {
        filtered = filtered.filter(p => p.labels.some(l => l.name === currentFilter));
    }
    if (currentSearch) {
        const q = currentSearch.toLowerCase();
        filtered = filtered.filter(p =>
            p.title.toLowerCase().includes(q) ||
            (p.body && p.body.toLowerCase().includes(q))
        );
    }

    if (!filtered.length) {
        container.innerHTML = `
            <div class="empty-state post-card">
                <i class="fas fa-inbox" aria-hidden="true"></i>
                Bu kriterlere uygun yazı bulunamadı.
            </div>`;
        return;
    }

    container.innerHTML = filtered.map(post => {
        const cat     = post.labels[0]?.name || 'edebiyat';
        const meta    = getCategoryMeta(cat);
        const excerpt = (post.body || '').replace(/[#*`_\[\]]/g, '').substring(0, 200);
        const date    = formatDate(post.created_at);
        const mins    = calculateReadingTime(post.body);

        return `
        <article class="post-card" tabindex="0"
            onclick="openModalById(${post.id})"
            onkeydown="if(event.key==='Enter'||event.key===' ') openModalById(${post.id})">
            <div class="post-category category-${cat}">
                <i class="fas ${meta.icon}" aria-hidden="true"></i> ${escapeHtml(meta.name)}
            </div>
            <h2 class="post-title">${escapeHtml(post.title)}</h2>
            <div class="post-meta">
                <span><i class="far fa-calendar-alt" aria-hidden="true"></i> ${date}</span>
                <span><i class="far fa-clock" aria-hidden="true"></i> ${mins} dk okuma</span>
            </div>
            <p class="post-excerpt">${escapeHtml(excerpt)}…</p>
            <button class="read-more-btn" tabindex="-1" aria-hidden="true">
                Devamını oku <i class="fas fa-arrow-right" aria-hidden="true"></i>
            </button>
        </article>`;
    }).join('');
}

/* ─── MODAL ─────────────────────────────────────────────── */
function openModalById(id) {
    const post = postMap.get(id);
    if (post) openModal(post);
}

function openModal(post) {
    lastFocused = document.activeElement;

    const cat  = post.labels[0]?.name || 'edebiyat';
    const meta = getCategoryMeta(cat);
    const date = formatDate(post.created_at);
    const mins = calculateReadingTime(post.body);

    // marked.js ile güvenli Markdown → HTML
    let content = post.body || '';
    content = typeof marked !== 'undefined' ? marked.parse(content) : '<p>' + escapeHtml(content) + '</p>';

    const shareUrl  = `${location.origin}${location.pathname}#post-${post.id}`;
    const tweetText = encodeURIComponent(post.title);
    const tweetUrl  = encodeURIComponent(shareUrl);

    document.getElementById('modalBody').innerHTML = `
        <div class="post-category category-${cat}" style="display:inline-flex; margin-bottom:1rem;">
            <i class="fas ${meta.icon}" aria-hidden="true"></i>&nbsp;${escapeHtml(meta.name)}
        </div>
        <h1 id="modalTitle" style="margin-top:0.5rem; font-size:1.6rem;">${escapeHtml(post.title)}</h1>
        <div class="post-meta" style="margin-top:0.5rem;">
            <span><i class="far fa-calendar-alt" aria-hidden="true"></i> ${date}</span>
            <span><i class="far fa-clock" aria-hidden="true"></i> ${mins} dk okuma</span>
        </div>
        <hr>
        ${content}
        <hr>
        <div class="modal-actions">
            <button class="btn-share" onclick="window.open('https://twitter.com/intent/tweet?text=${tweetText}&url=${tweetUrl}','_blank')">
                <i class="fab fa-twitter" aria-hidden="true"></i> Paylaş
            </button>
            <button class="btn-copy" onclick="copyLink('${shareUrl}')">
                <i class="fas fa-link" aria-hidden="true"></i> Linki kopyala
            </button>
        </div>`;

    // URL hash güncelle
    history.pushState({ postId: post.id }, '', `#post-${post.id}`);

    const modal   = document.getElementById('postModal');
    const content2 = modal.querySelector('.modal-content');
    modal.classList.add('open');

    // Progress bar sıfırla
    document.getElementById('readProgress').style.width = '0%';

    // Scroll progress
    content2.onscroll = () => {
        const pct = content2.scrollTop / (content2.scrollHeight - content2.clientHeight) * 100;
        document.getElementById('readProgress').style.width = Math.min(100, pct) + '%';
    };

    // Focus yönetimi
    requestAnimationFrame(() => document.getElementById('closeModal').focus());
}

function closeModal() {
    const modal = document.getElementById('postModal');
    modal.classList.remove('open');
    history.pushState(null, '', location.pathname);
    if (lastFocused) lastFocused.focus();
}

function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => {
        const btn = event.target.closest('button');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Kopyalandı!';
        setTimeout(() => btn.innerHTML = orig, 2000);
    });
}

/* ─── MODAL KAPATMA ─────────────────────────────────────── */
document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('postModal').addEventListener('click', e => {
    if (e.target === document.getElementById('postModal')) closeModal();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('postModal').classList.contains('open')) closeModal();
});

// Geri/ileri butonu
window.addEventListener('popstate', () => {
    const hash = location.hash;
    if (hash.startsWith('#post-')) {
        const id   = parseInt(hash.replace('#post-', ''), 10);
        const post = postMap.get(id);
        if (post) openModal(post);
    } else {
        closeModal();
    }
});

/* ─── ARAMA — DEBOUNCE ──────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        currentSearch = e.target.value.trim();
        displayPosts();
    }, 250);
});

/* ─── KATEGORİ FİLTRELERİ ───────────────────────────────── */
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
            b.removeAttribute('aria-pressed');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        currentFilter = btn.dataset.category;
        displayPosts();
    });
});

/* ─── BAŞLAT ────────────────────────────────────────────── */
loadPosts();
</script>
</body>
</html>
