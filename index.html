<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindiba | Eşref Akbaş - Hatıra Defteri</title>
    <meta name="description" content="Eşref Akbaş'ın kişisel blogu - Edebiyat, şiir ve günlük yazıları">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Hindiba | Eşref Akbaş">
    <meta property="og:description" content="Edebiyat, şiir ve günlük yazıları">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://esakbas.github.io">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* ========================================
                   TEMEL DEĞİŞKENLER
                ======================================== */
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --card-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.05);
            --gradient-start: #4f46e5;
            --gradient-end: #ec4899;
            --transition-speed: 0.3s;
        }

        /* ========================================
                   KOYU TEMA
                ======================================== */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #818cf8;
            --border-color: #334155;
        }

        /* ========================================
                   GENEL STILLER
                ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            padding-bottom: 3rem;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* ========================================
                   HEADER
                ======================================== */
        header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.1)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            opacity: 0.3;
            pointer-events: none;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            position: relative;
            animation: fadeInDown 0.8s ease;
        }

        header p {
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            font-size: 1rem;
            position: relative;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
                   OKUMA İLERLEME ÇUBUĞU
                ======================================== */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            z-index: 999;
            transition: width 0.1s;
            width: 0%;
        }

        /* ========================================
                   ANA KONTEYNER
                ======================================== */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* ========================================
                   ARAMA BÖLÜMÜ
                ======================================== */
        .search-section {
            margin-bottom: 1.5rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background-color: var(--container-bg);
            color: var(--text-main);
            font-size: 0.9rem;
            transition: all var(--transition-speed);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* ========================================
                   KATEGORİ FİLTRELERİ
                ======================================== */
        .category-filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition-speed);
        }

        .filter-btn i {
            margin-right: 0.3rem;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border-color: transparent;
        }

        /* ========================================
                   YAZI KARTLARI
                ======================================== */
        .blog-posts {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .post-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.8rem;
            transition: all var(--transition-speed);
            cursor: pointer;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
            border-color: transparent;
        }

        .post-category {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .category-edebiyat {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }
        .category-siir {
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
        }
        .category-gunluk {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .category-bir-cumle {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .post-title {
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .post-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .post-meta i {
            margin-right: 0.3rem;
        }

        .post-excerpt {
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: gap var(--transition-speed);
        }

        .read-more-btn:hover {
            gap: 0.6rem;
        }

        /* ========================================
                   YÜKLEYİCİ (Skeleton)
                ======================================== */
        .skeleton-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.8rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-title {
            height: 24px;
            background-color: var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            width: 70%;
        }

        .skeleton-text {
            height: 14px;
            background-color: var(--border-color);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        .skeleton-text.short {
            width: 60%;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* ========================================
                   SİDEBAR
                ======================================== */
        .sidebar-widget {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all var(--transition-speed);
        }

        .sidebar-widget:hover {
            transform: translateY(-3px);
            box-shadow: var(--card-shadow);
        }

        .widget-title {
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .widget-title i {
            color: var(--accent-color);
        }

        /* Profil Kartı */
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 1rem;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            transition: transform var(--transition-speed);
            cursor: pointer;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            transition: all var(--transition-speed);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .profile-name:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            margin: 0.75rem auto;
            border-radius: 2px;
        }

        .profile-location {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        /* Sosyal Medya */
        .social-links {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 0;
        }

        .social-links a {
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: all var(--transition-speed);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-color);
            text-decoration: none;
        }

        .social-links a:hover {
            transform: translateY(-3px);
        }

        .social-links a:nth-child(1):hover {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
        }
        .social-links a:nth-child(2):hover {
            background: #000000;
            color: white;
        }
        .social-links a:nth-child(3):hover {
            background: #333;
            color: white;
        }

        /* Popüler Yazılar */
        .popular-posts {
            list-style: none;
        }

        .popular-posts li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .popular-posts li i {
            color: var(--accent-color);
            font-size: 0.8rem;
        }

        .popular-posts li a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color var(--transition-speed);
        }

        .popular-posts li a:hover {
            color: var(--accent-color);
        }

        /* İstatistikler */
        .stat-list {
            list-style: none;
            font-size: 0.85rem;
        }

        .stat-list li {
            padding: 0.3rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-list li i {
            color: var(--accent-color);
            width: 1.2rem;
        }

        /* ========================================
                   FLOATING ACTION BUTTONS
                ======================================== */
        .floating-actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .floating-actions button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            transition: all var(--transition-speed);
        }

        .floating-actions button:hover {
            transform: scale(1.1);
        }

        .back-to-top {
            opacity: 0;
            transform: translateY(20px);
            transition: all var(--transition-speed);
        }

        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ========================================
                   MODAL
                ======================================== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--container-bg);
            margin: 3rem auto;
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            border-radius: 24px;
            position: relative;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .close-modal {
            position: absolute;
            right: 1.5rem;
            top: 1rem;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform var(--transition-speed);
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        .modal-body img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .modal-body blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .modal-body pre {
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .modal-body code {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .post-stats {
            display: flex;
            gap: 1.5rem;
            margin: 1rem 0;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .post-stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ========================================
                   TOAST BİLDİRİM
                ======================================== */
        .toast {
            position: fixed;
            bottom: 160px;
            right: 30px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 9999;
            max-width: 350px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast i {
            margin-right: 10px;
        }

        /* ========================================
                   SCROLLBAR
                ======================================== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }

        /* ========================================
                   RESPONSIVE
                ======================================== */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2rem;
            }

            .floating-actions {
                bottom: 20px;
                right: 20px;
            }

            .floating-actions button {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }

            .toast {
                bottom: 80px;
                right: 20px;
                left: 20px;
                max-width: none;
            }

            .modal-content {
                margin: 1rem;
                padding: 1.5rem;
            }

            .post-stats {
                flex-wrap: wrap;
                gap: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .category-filters {
                gap: 0.5rem;
            }

            .filter-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
            }

            .post-card {
                padding: 1.2rem;
            }

            .post-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <!-- ========================================
    OKUMA İLERLEME ÇUBUĞU
    ======================================== -->
    <div class="reading-progress" id="readingProgress"></div>

    <!-- ========================================
    HEADER
    ======================================== -->
    <header>
        <h1><i class="fas fa-feather-alt"></i> Hindiba</h1>
        <p>Belki de şimdiye kadar ardından söylenebilecek en zarif benzetme "Hindiba" idi…</p>
    </header>

    <!-- ========================================
    ANA İÇERİK
    ======================================== -->
    <div class="container">

        <!-- ===== ANA KOLON ===== -->
        <main>

            <!-- Arama -->
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Yazılarda ara... (Başlık veya içerik)">
                </div>
            </div>

            <!-- Kategori Filtreleri -->
            <div class="category-filters" id="categoryFilters">
                <!-- Dinamik olarak doldurulacak -->
            </div>

            <!-- Yazılar -->
            <div class="blog-posts" id="posts">
                <!-- İskelet yükleyiciler -->
                <div class="skeleton-card">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>
            </div>

            <!-- Sonsuz Kaydırma Yükleyici -->
            <div id="loader" style="text-align: center; padding: 2rem; display: none;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--accent-color);"></i>
            </div>

        </main>

        <!-- ===== SİDEBAR ===== -->
        <aside>

            <!-- Profil Kartı -->
            <div class="sidebar-widget profile-card">
                <img src="pp.jpg" class="profile-img" alt="Profil" 
                     onerror="this.src='https://ui-avatars.com/api/?name=Eşref+Akbaş&background=4f46e5&color=fff&size=128'">
                <div class="profile-name">Eşref Akbaş</div>
                <div class="profile-divider"></div>
                <div class="profile-location">
                    <i class="fas fa-map-marker-alt"></i> Wan
                </div>
            </div>

            <!-- İstatistikler -->
            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-chart-line"></i> Blog İstatistikleri
                </div>
                <ul class="stat-list">
                    <li><i class="fas fa-pen-fancy"></i> Toplam Yazı: <span id="totalPosts">0</span></li>
                    <li><i class="fas fa-tags"></i> Kategori Sayısı: <span id="totalCategories">0</span></li>
                    <li><i class="fas fa-clock"></i> Son Güncelleme: <span id="lastUpdate">-</span></li>
                </ul>
            </div>

            <!-- Kategoriler -->
            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-tags"></i> Kategoriler
                </div>
                <ul class="stat-list" id="categoryList">
                    <!-- Dinamik doldurulacak -->
                </ul>
            </div>

            <!-- Son Yazılar -->
            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-clock"></i> Son Yazılar
                </div>
                <ul class="popular-posts" id="recentPosts">
                    <li><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</li>
                </ul>
            </div>

            <!-- Sosyal Medya -->
            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-share-alt"></i> Takip Et
                </div>
                <div class="social-links">
                    <a href="https://www.instagram.com/esrefakbs" target="_blank" aria-label="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://x.com/esrefakbs" target="_blank" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="https://github.com/esakbas" target="_blank" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </div>

        </aside>

    </div>

    <!-- ========================================
    FLOATING ACTION BUTTONS
    ======================================== -->
    <div class="floating-actions">
        <button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Yukarı Çık">
            <i class="fas fa-arrow-up"></i>
        </button>
        <button onclick="toggleTheme()" aria-label="Tema Değiştir">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </div>

    <!-- ========================================
    MODAL
    ======================================== -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- ========================================
    TOAST BİLDİRİM
    ======================================== -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle" style="color: #10b981;"></i>
        <span id="toastMessage">İşlem başarılı!</span>
    </div>

    <!-- ========================================
    JAVASCRIPT
    ======================================== -->
    <script>
        /**
         * ============================================================
         * KONFİGÜRASYON
         * ============================================================
         */
        const CONFIG = {
            REPO_OWNER: 'esakbas',
            REPO_NAME: 'esakbas.github.io',
            POSTS_PER_PAGE: 10,
            CACHE_DURATION: 5 * 60 * 1000, // 5 dakika
        };

        /**
         * ============================================================
         * STATE YÖNETİMİ
         * ============================================================
         */
        const state = {
            allPosts: [],
            filteredPosts: [],
            currentFilter: 'all',
            currentSearch: '',
            currentPage: 1,
            isLoading: false,
            hasMore: true,
            darkMode: localStorage.getItem('darkMode') === 'true',
        };

        /**
         * ============================================================
         * YARDIMCI FONKSİYONLAR
         * ============================================================
         */

        function calculateReadingTime(content) {
            const words = content?.split(/\s+/).length || 0;
            return Math.max(1, Math.ceil(words / 200));
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCategoryInfo(category) {
            const map = {
                'edebiyat': { name: 'Edebiyat', icon: 'fa-book', color: 'category-edebiyat' },
                'siir': { name: 'Şiir', icon: 'fa-feather-alt', color: 'category-siir' },
                'gunluk': { name: 'Günlük', icon: 'fa-journal-whills', color: 'category-gunluk' },
                'bir-cumle': { name: 'Bir Cümle', icon: 'fa-quote-left', color: 'category-bir-cumle' }
            };
            return map[category] || { name: category, icon: 'fa-tag', color: '' };
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('tr-TR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toastMessage.textContent = message;

            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            const colors = {
                success: '#10b981',
                error: '#ef4444',
                info: '#3b82f6'
            };

            icon.className = `fas ${icons[type] || icons.info}`;
            icon.style.color = colors[type] || colors.info;

            toast.classList.add('show');
            clearTimeout(toast.timeout);
            toast.timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href)
                .then(() => showToast('Link kopyalandı!', 'success'))
                .catch(() => showToast('Link kopyalanamadı', 'error'));
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /**
         * ============================================================
         * MARKDOWN İŞLEME
         * ============================================================
         */
        function markdownToHtml(md) {
            if (!md) return '';

            let html = md;

            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang || 'text'}">${escapeHtml(code.trim())}</code></pre>`;
            });

            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

            html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');

            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" loading="lazy">');

            html = html.split('\n\n').map(para => {
                if (para.trim() === '') return '';
                if (para.startsWith('<') || para.startsWith('```')) return para;
                return `<p>${para.replace(/\n/g, '<br>')}</p>`;
            }).join('');

            return html;
        }

        /**
         * ============================================================
         * API İSTEKLERİ
         * ============================================================
         */
        async function fetchPosts() {
            try {
                const cacheKey = `github_posts_${CONFIG.REPO_OWNER}_${CONFIG.REPO_NAME}`;
                const cached = localStorage.getItem(cacheKey);

                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CONFIG.CACHE_DURATION) {
                        return data;
                    }
                }

                const response = await fetch(
                    `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/issues?state=all&per_page=100`, {
                        headers: {
                            'Accept': 'application/vnd.github.v3+json',
                        }
                    }
                );

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const posts = data.filter(issue => issue.labels && issue.labels.length > 0);

                localStorage.setItem(cacheKey, JSON.stringify({
                    data: posts,
                    timestamp: Date.now()
                }));

                return posts;

            } catch (error) {
                console.error('Yazılar yüklenirken hata:', error);
                showToast('Yazılar yüklenirken bir hata oluştu', 'error');
                return [];
            }
        }

        /**
         * ============================================================
         * RENDER FONKSİYONLARI
         * ============================================================
         */

        function renderCategories() {
            const categories = {};
            state.allPosts.forEach(post => {
                post.labels.forEach(label => {
                    categories[label.name] = (categories[label.name] || 0) + 1;
                });
            });

            const filterContainer = document.getElementById('categoryFilters');
            let filterHtml = `
                <button class="filter-btn active" data-category="all">
                    <i class="fas fa-globe"></i> Tümü (${state.allPosts.length})
                </button>
            `;

            Object.entries(categories).forEach(([category, count]) => {
                const info = getCategoryInfo(category);
                filterHtml += `
                    <button class="filter-btn" data-category="${category}">
                        <i class="fas ${info.icon}"></i> ${info.name} (${count})
                    </button>
                `;
            });

            filterContainer.innerHTML = filterHtml;

            const categoryList = document.getElementById('categoryList');
            categoryList.innerHTML = Object.entries(categories).map(([category, count]) => {
                const info = getCategoryInfo(category);
                return `<li><i class="fas ${info.icon}"></i> ${info.name} (${count})</li>`;
            }).join('');

            document.getElementById('totalCategories').textContent = Object.keys(categories).length;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.currentFilter = btn.dataset.category;
                    state.currentPage = 1;
                    state.hasMore = true;
                    renderPosts();
                });
            });
        }

        function renderPosts() {
            const container = document.getElementById('posts');

            let filtered = state.allPosts;

            if (state.currentFilter !== 'all') {
                filtered = filtered.filter(post =>
                    post.labels.some(l => l.name === state.currentFilter)
                );
            }

            if (state.currentSearch) {
                const searchLower = state.currentSearch.toLowerCase();
                filtered = filtered.filter(post =>
                    post.title.toLowerCase().includes(searchLower) ||
                    (post.body && post.body.toLowerCase().includes(searchLower))
                );
            }

            state.filteredPosts = filtered;

            const start = 0;
            const end = state.currentPage * CONFIG.POSTS_PER_PAGE;
            const pagePosts = filtered.slice(start, end);

            state.hasMore = end < filtered.length;

            if (filtered.length === 0 && state.currentPage === 1) {
                container.innerHTML = `
                    <div class="post-card">
                        <i class="fas fa-search" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>
                        <p style="text-align: center;">Bu kriterlere uygun yazı bulunamadı.</p>
                    </div>
                `;
                document.getElementById('loader').style.display = 'none';
                return;
            }

            if (state.currentPage === 1) {
                container.innerHTML = '';
            }

            const postsHtml = pagePosts.slice((state.currentPage - 1) * CONFIG.POSTS_PER_PAGE).map(post => {
                const category = post.labels[0]?.name || 'edebiyat';
                const info = getCategoryInfo(category);
                const content = post.body || '';
                const excerpt = content.split('\n').slice(0, 3).join(' ').substring(0, 180) + '...';
                const readTime = calculateReadingTime(content);
                const date = formatDate(post.created_at);

                return `
                    <article class="post-card" data-post='${JSON.stringify(post).replace(/"/g, '&quot;')}'>
                        <div class="post-category ${info.color}">
                            <i class="fas ${info.icon}"></i> ${info.name}
                        </div>
                        <h2 class="post-title">${escapeHtml(post.title)}</h2>
                        <div class="post-meta">
                            <span><i class="far fa-calendar-alt"></i> ${date}</span>
                            <span class="reading-time"><i class="far fa-clock"></i> ${readTime} dk okuma</span>
                        </div>
                        <p class="post-excerpt">${escapeHtml(excerpt)}</p>
                        <button class="read-more-btn" onclick="openModalFromElement(this)">
                            Devamını Oku <i class="fas fa-arrow-right"></i>
                        </button>
                    </article>
                `;
            }).join('');

            if (state.currentPage === 1) {
                container.innerHTML = postsHtml;
            } else {
                container.innerHTML += postsHtml;
            }

            document.getElementById('loader').style.display = state.hasMore ? 'block' : 'none';
            document.getElementById('totalPosts').textContent = state.allPosts.length;

            if (state.allPosts.length > 0) {
                const lastPost = state.allPosts.reduce((a, b) =>
                    new Date(a.updated_at) > new Date(b.updated_at) ? a : b
                );
                document.getElementById('lastUpdate').textContent = formatDate(lastPost.updated_at);
            }
        }

        function renderRecentPosts() {
            const recent = [...state.allPosts]
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                .slice(0, 5);

            const container = document.getElementById('recentPosts');

            if (recent.length === 0) {
                container.innerHTML = '<li><i class="fas fa-info-circle"></i> Henüz yazı yok</li>';
                return;
            }

            container.innerHTML = recent.map(post => `
                <li>
                    <i class="fas fa-angle-right"></i>
                    <a href="#" onclick="openModalFromPost(${JSON.stringify(post).replace(/"/g, '&quot;')}); return false;">
                        ${escapeHtml(post.title)}
                    </a>
                </li>
            `).join('');
        }

        /**
         * ============================================================
         * MODAL İŞLEMLERİ
         * ============================================================
         */

        function openModalFromElement(element) {
            const post = JSON.parse(element.closest('.post-card').dataset.post);
            openModal(post);
        }

        function openModalFromPost(post) {
            openModal(post);
        }

        function openModal(post) {
            const modal = document.getElementById('postModal');
            const modalBody = document.getElementById('modalBody');

            const category = post.labels[0]?.name || 'edebiyat';
            const info = getCategoryInfo(category);
            const content = post.body || '';
            const readTime = calculateReadingTime(content);
            const date = formatDate(post.created_at);

            let cleanContent = content.replace(/^## .*\n/, '');
            cleanContent = markdownToHtml(cleanContent);

            modalBody.innerHTML = `
                <div class="post-category ${info.color}" style="margin-bottom: 1rem; display: inline-flex;">
                    <i class="fas ${info.icon}"></i> ${info.name}
                </div>
                <h1 style="margin-top: 1rem;">${escapeHtml(post.title)}</h1>
                <div class="post-meta" style="margin-top: 0.5rem;">
                    <span><i class="far fa-calendar-alt"></i> ${date}</span>
                    <span><i class="far fa-clock"></i> ${readTime} dk okuma</span>
                </div>
                <div class="post-stats">
                    <span><i class="fas fa-comment"></i> ${post.comments} yorum</span>
                    <span><i class="fas fa-hashtag"></i> #${category}</span>
                </div>
                <hr style="margin: 1.5rem 0;">
                ${cleanContent}
                <hr style="margin: 1.5rem 0;">
                <div style="display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;">
                    <button onclick="window.open('https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(window.location.href)}', '_blank')" 
                            style="background: #000; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <i class="fab fa-twitter"></i> Paylaş
                    </button>
                    <button onclick="copyLink()" 
                            style="background: var(--accent-color); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <i class="fas fa-link"></i> Kopyala
                    </button>
                    <button onclick="window.open('${post.html_url}', '_blank')" 
                            style="background: #6b7280; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <i class="fab fa-github"></i> GitHub'da Gör
                    </button>
                </div>
            `;

            // ==========================================
            // YORUM SİSTEMİ (FIREBASE)
            // ==========================================
            const commentContainer = document.createElement('div');
            commentContainer.id = 'commentContainer';
            commentContainer.style.marginTop = '2rem';

            commentContainer.innerHTML = `
                <hr>
                <h3 style="display:flex; align-items:center; gap:0.5rem; margin:1rem 0;">
                    <i class="fas fa-comment"></i> Yorum Yap
                </h3>
                <form id="commentForm">
                    <input type="text" id="commentName" placeholder="Adınız" required 
                           style="width:100%; padding:0.5rem; margin-bottom:0.5rem; 
                                  border:1px solid var(--border-color); border-radius:8px; 
                                  background:var(--container-bg); color:var(--text-main);">
                    <textarea id="commentText" placeholder="Yorumunuz..." required 
                              style="width:100%; padding:0.5rem; margin-bottom:0.5rem; 
                                     border:1px solid var(--border-color); border-radius:8px; 
                                     background:var(--container-bg); color:var(--text-main); height:100px;"></textarea>
                    <div style="display:flex; justify-content:flex-end;">
                        <button type="submit" 
                                style="background:var(--accent-color); color:white; 
                                       border:none; padding:0.5rem 1.5rem; border-radius:50px; 
                                       cursor:pointer; font-weight:600;">
                            <i class="fas fa-paper-plane"></i> Gönder
                        </button>
                    </div>
                </form>
                <div id="commentsList" style="margin-top:1.5rem;">
                    <p style="color:var(--text-muted);">Yorumlar yükleniyor...</p>
                </div>
            `;

            modalBody.appendChild(commentContainer);

            // Form submit event
            document.getElementById('commentForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('commentName').value.trim();
                const comment = document.getElementById('commentText').value.trim();
                if (name && comment) {
                    submitComment(post.id, name, comment);
                    document.getElementById('commentName').value = '';
                    document.getElementById('commentText').value = '';
                } else {
                    alert('Lütfen adınızı ve yorumunuzu girin.');
                }
            });

            // Onaylanmış yorumları göster
            getApprovedComments(post.id, (comments) => {
                const list = document.getElementById('commentsList');
                if (comments.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-muted);">📭 Henüz onaylanmış yorum yok. İlk yorumu siz yapın!</p>';
                } else {
                    list.innerHTML = comments.map(c => `
                        <div style="border-bottom:1px solid var(--border-color); padding:0.8rem 0;">
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <i class="fas fa-user-circle" style="color:var(--accent-color); font-size:1.2rem;"></i>
                                <strong>${escapeHtml(c.name)}</strong>
                                <small style="color:var(--text-muted); margin-left:auto;">
                                    ${c.createdAt ? new Date(c.createdAt.toDate()).toLocaleDateString('tr-TR') : ''}
                                </small>
                            </div>
                            <p style="margin:0.5rem 0 0 0; word-break:break-word;">${escapeHtml(c.comment)}</p>
                        </div>
                    `).join('');
                }
            });

            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            document.getElementById('readingProgress').style.width = '0%';
        }

        function closeModal() {
            const modal = document.getElementById('postModal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        /**
         * ============================================================
         * FIREBASE KONFİGÜRASYONU VE FONKSİYONLAR
         * ============================================================
         */

        // 🔥 FIREBASE KONFİG - KENDİ BİLGİLERİNİZLE DEĞİŞTİRİN
        const firebaseConfig = {
            apiKey: "AIzaSyD...",  // 👈 KENDİ API KEY'İNİZ
            authDomain: "hindiba-blog.firebaseapp.com",  // 👈 KENDİ DOMAIN'İNİZ
            projectId: "hindiba-blog",  // 👈 KENDİ PROJE ID'NİZ
            storageBucket: "hindiba-blog.appspot.com",  // 👈 KENDİ BUCKET
            messagingSenderId: "123456789",  // 👈 KENDİ SENDER ID
            appId: "1:123456789:web:abcdef"  // 👈 KENDİ APP ID
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Yorum gönderme
        function submitComment(postId, name, comment) {
            db.collection("comments").add({
                postId: postId,
                name: name,
                comment: comment,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                approved: false
            })
            .then(() => {
                showToast('✅ Yorumunuz admin onayına gönderildi!', 'success');
            })
            .catch(err => {
                console.error('❌ Yorum gönderilemedi:', err);
                showToast('❌ Bir hata oluştu, lütfen tekrar deneyin.', 'error');
            });
        }

        // Onaylanmış yorumları getir
        function getApprovedComments(postId, callback) {
            db.collection("comments")
                .where("postId", "==", postId)
                .where("approved", "==", true)
                .orderBy("createdAt", "asc")
                .get()
                .then((snapshot) => {
                    const comments = [];
                    snapshot.forEach(doc => {
                        comments.push({ id: doc.id, ...doc.data() });
                    });
                    callback(comments);
                })
                .catch(err => {
                    console.error('❌ Yorumlar alınamadı:', err);
                    callback([]);
                });
        }

        // Admin onay paneli
        function adminApprove() {
            const password = prompt('🔒 Admin şifresini girin:');
            if (password !== 'seninşifren') {  // 👈 Şifreyi değiştirin
                showToast('❌ Yanlış şifre!', 'error');
                return;
            }

            db.collection("comments")
                .where("approved", "==", false)
                .get()
                .then(snapshot => {
                    if (snapshot.empty) {
                        showToast('📭 Onay bekleyen yorum yok.', 'info');
                        return;
                    }

                    let message = '📋 Onay bekleyen yorumlar:\n\n';
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        message += `📝 ${data.name}: ${data.comment}\n`;
                    });

                    if (confirm(message + '\n\nTümünü onaylamak istiyor musunuz?')) {
                        const batch = db.batch();
                        snapshot.forEach(doc => {
                            batch.update(doc.ref, { approved: true });
                        });
                        batch.commit().then(() => {
                            showToast('✅ Tüm yorumlar onaylandı!', 'success');
                        }).catch(err => {
                            showToast('❌ Hata oluştu: ' + err.message, 'error');
                        });
                    }
                })
                .catch(err => {
                    console.error(err);
                    showToast('❌ Hata oluştu: ' + err.message, 'error');
                });
        }

        // Admin butonunu ekle
        const adminBtn = document.createElement('button');
        adminBtn.textContent = '🛠️ Admin Onay Paneli';
        adminBtn.style.cssText = `
            position: fixed; bottom: 100px; right: 20px; 
            background: var(--accent-color); color: white; 
            border: none; padding: 10px 20px; 
            border-radius: 50px; cursor: pointer; 
            z-index: 999; box-shadow: 0 4px 15px rgba(79,70,229,0.3);
            font-weight: 600; transition: all 0.3s;
        `;
        adminBtn.onmouseover = () => { adminBtn.style.transform = 'scale(1.05)'; };
        adminBtn.onmouseout = () => { adminBtn.style.transform = 'scale(1)'; };
        adminBtn.onclick = adminApprove;
        document.body.appendChild(adminBtn);

        /**
         * ============================================================
         * TEMA YÖNETİMİ
         * ============================================================
         */

        function toggleTheme() {
            state.darkMode = !state.darkMode;
            localStorage.setItem('darkMode', state.darkMode);
            updateTheme();
            showToast(state.darkMode ? '🌙 Koyu tema aktif' : '☀️ Açık tema aktif', 'info');
        }

        function updateTheme() {
            const icon = document.getElementById('themeIcon');

            if (state.darkMode) {
                document.documentElement.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
            } else {
                document.documentElement.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
            }
        }

        /**
         * ============================================================
         * EVENT KURUCULARI
         * ============================================================
         */

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            let timeout;

            searchInput.addEventListener('input', (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    state.currentSearch = e.target.value.trim();
                    state.currentPage = 1;
                    state.hasMore = true;
                    renderPosts();
                }, 300);
            });
        }

        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && state.hasMore && !state.isLoading) {
                    state.isLoading = true;
                    state.currentPage++;
                    renderPosts();
                    state.isLoading = false;
                }
            }, { threshold: 0.1 });

            const loader = document.getElementById('loader');
            if (loader) observer.observe(loader);
        }

        function setupReadingProgress() {
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                document.getElementById('readingProgress').style.width = `${Math.min(100, progress)}%`;

                const backToTop = document.getElementById('backToTop');
                if (scrollTop > 300) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });
        }

        function setupModal() {
            document.getElementById('closeModal').onclick = closeModal;

            window.onclick = (e) => {
                if (e.target === document.getElementById('postModal')) {
                    closeModal();
                }
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        }

        /**
         * ============================================================
         * BAŞLATMA
         * ============================================================
         */

        async function init() {
            updateTheme();

            state.allPosts = await fetchPosts();

            renderCategories();
            renderPosts();
            renderRecentPosts();

            setupSearch();
            setupInfiniteScroll();
            setupReadingProgress();
            setupModal();

            // Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(() => console.log('✅ Service Worker kaydedildi'))
                    .catch(err => console.log('❌ Service Worker kaydedilemedi:', err));
            }

            console.log(`🚀 Hindiba yüklendi! ${state.allPosts.length} yazı bulundu.`);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
