<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindiba | Hatıra Defteri</title>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --container-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-color: #6366f1;
                --accent-hover: #818cf8;
                --border-color: #334155;
                --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            padding-bottom: 3rem;
        }

        header {
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 3rem 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.7rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-color), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-style: italic;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .blog-posts {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }

        .post-card:hover {
            transform: translateY(-4px);
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .post-category {
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
        }

        .post-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .post-excerpt {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .read-more-btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
        }

        .read-more-btn:hover {
            background-color: var(--accent-hover);
        }

        aside {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .sidebar-widget {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
        }

        .widget-title {
            font-weight: 700;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .profile-img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Hindiba 🌟</h1>
    <p>Seneler sonra burası, bir hatıra defteri olacak...</p>
</header>

<div class="container">

    <!-- BLOG LİSTE ALANI -->
    <main class="blog-posts" id="posts"></main>

    <!-- SIDEBAR -->
    <aside>

        <div class="sidebar-widget">
            <h3 class="widget-title">Hakkımda</h3>
            <img src="pp.jpg" class="profile-img">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Merhaba! Burada yazılarımı paylaşıyorum.
            </p>
        </div>

        <div class="sidebar-widget">
            <h3 class="widget-title">Kategoriler</h3>
            <ul style="list-style:none; color: var(--text-muted); font-size:0.9rem;">
                <li>✒️ Edebiyat</li>
                <li>📜 Şiir</li>
                <li>📓 Günlük</li>
            </ul>
        </div>

    </aside>

</div>

<script>
async function loadPosts() {

    const posts = [
        {
            file: "posts/ilk-yazi.md",
            title: "Sıfırdan Başlayanların Gece Notları",
            date: "9 Haziran 2026",
            category: "✒️ Edebiyat",
            excerpt: "Zaman akıp giderken geride bıraktığımız izlerin ne kadarı bize ait?"
        }
    ];

    const container = document.getElementById("posts");

    posts.forEach(post => {
        const card = document.createElement("article");
        card.className = "post-card";

        card.innerHTML = `
            <div class="post-meta">
                <span class="post-category">${post.category}</span>
                <span>${post.date}</span>
            </div>
            <h2 class="post-title">${post.title}</h2>
            <p class="post-excerpt">${post.excerpt}</p>
            <a class="read-more-btn" href="${post.file}">Devamını Oku</a>
        `;

        container.appendChild(card);
    });
}

loadPosts();
</script>

</body>
</html>
