<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindiba | Eşref Akbaş - Hatıra Defteri</title>
    <meta name="description" content="Eşref Akbaş'ın kişisel blogu - Edebiyat, şiir ve günlük yazıları">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --card-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.05);
            --gradient-start: #4f46e5;
            --gradient-end: #ec4899;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --container-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-color: #6366f1;
                --accent-hover: #818cf8;
                --border-color: #334155;
                --card-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.4);
                --gradient-start: #6366f1;
                --gradient-end: #f43f5e;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            padding-bottom: 3rem;
        }

        header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.1)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            opacity: 0.3;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            position: relative;
            animation: fadeInDown 0.8s ease;
        }

        header p {
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            font-size: 1rem;
            position: relative;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .search-section {
            margin-bottom: 1.5rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background-color: var(--container-bg);
            color: var(--text-main);
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .category-filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn i {
            margin-right: 0.3rem;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border-color: transparent;
        }

        .blog-posts {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .post-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.8rem;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
            border-color: transparent;
        }

        .post-card-link {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .post-category {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }

        .category-edebiyat {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }
        .category-siir {
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
        }
        .category-gunluk {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .category-bir-cumle {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .post-title {
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .post-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .post-meta i {
            margin-right: 0.3rem;
        }

        .post-excerpt {
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: gap 0.3s;
            position: relative;
            z-index: 2;
        }

        .read-more-btn:hover {
            gap: 0.6rem;
        }

        /* SIDEBAR */
        .sidebar-widget {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .sidebar-widget:hover {
            transform: translateY(-3px);
            box-shadow: var(--card-shadow);
        }

        .widget-title {
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .widget-title i {
            color: var(--accent-color);
        }

        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 1rem;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            transition: transform 0.3s;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            transition: all 0.3s;
            cursor: pointer;
            letter-spacing: 1px;
            text-align: center;
            display: block;
            width: 100%;
        }

        .profile-name:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            margin: 0.75rem auto;
            border-radius: 2px;
            display: block;
        }

        .profile-location {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            width: 100%;
        }

        .social-links {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 0;
        }

        .social-links a {
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-color);
            text-decoration: none;
        }

        .social-links a:hover {
            transform: translateY(-3px);
        }

        .social-links a:nth-child(1):hover {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
        }
        .social-links a:nth-child(2):hover {
            background: #000000;
            color: white;
        }

        .reading-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
        }

        .popular-posts {
            list-style: none;
        }

        .popular-posts li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .popular-posts li a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .popular-posts li a:hover {
            color: var(--accent-color);
        }

        /* SKELETON */
        .skeleton-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.8rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-title {
            height: 24px;
            background-color: var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            width: 70%;
        }

        .skeleton-text {
            height: 14px;
            background-color: var(--border-color);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        .skeleton-text.short {
            width: 60%;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--container-bg);
            margin: 3rem auto;
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            border-radius: 24px;
            position: relative;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .close-modal {
            position: absolute;
            right: 1.5rem;
            top: 1rem;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10;
            color: var(--text-main);
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1><i class="fas fa-feather-alt"></i> Hindiba</h1>
        <p>Belki de şimdiye kadar ardından söylenebilecek en zarif benzetme “Hindiba” idi…</p>
    </header>

    <div class="container">
        <main>
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search" aria-hidden="true"></i>
                    <input type="text" id="searchInput" placeholder="Yazılarda ara... (Başlık veya içerik)" aria-label="Yazılarda ara">
                </div>
            </div>

            <div class="category-filters" role="tablist">
                <button class="filter-btn active" data-category="all" role="tab" aria-selected="true"><i class="fas fa-globe"></i> Tümü</button>
                <button class="filter-btn" data-category="edebiyat" role="tab" aria-selected="false"><i class="fas fa-book"></i> Edebiyat</button>
                <button class="filter-btn" data-category="siir" role="tab" aria-selected="false"><i class="fas fa-feather-alt"></i> Şiir</button>
                <button class="filter-btn" data-category="gunluk" role="tab" aria-selected="false"><i class="fas fa-journal-whills"></i> Günlük</button>

            <div class="blog-posts" id="posts" aria-live="polite">
                <div class="skeleton-card">
                    <div class="skeleton-title"></div>

                </div>
                <div class="skeleton-card">
                    <div class="skeleton-title"></div>

                </div>
            </div>
        </main>

        <aside>
            <div class="sidebar-widget profile-card">
                <img src="pp.jpg" class="profile-img" alt="Eşref Akbaş profil fotoğrafı"
                onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23e5e7eb%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%236c757d%22 font-size=%2220%22%3EEA%3C/text%3E%3C/svg%3E';">
                <div class="profile-name">Eşref Akbaş</div>
                <div class="profile-divider"></div>
                <div class="profile-location">
                    <i class="fas fa-map-marker-alt"></i> Wan
                </div>
            </div>

            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-chart-line"></i> Blog İstatistikleri
                </div>
                <ul style="list-style:none; font-size:0.85rem;">
                    <li><i class="fas fa-pen-fancy"></i> Toplam Yazı: <span id="totalPosts">0</span></li>
                    <li><i class="fas fa-tags"></i> Kategori Sayısı: 4</li>
                </ul>
            </div>

            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-tags"></i> Kategoriler
                </div>
                <ul style="list-style:none; font-size:0.85rem;" id="categoryCounts">
                    <li id="cat-edebiyat-count"><i class="fas fa-book"></i> Edebiyat (0)</li>
                    <li id="cat-siir-count"><i class="fas fa-feather-alt"></i> Şiir (0)</li>
                    <li id="cat-gunluk-count"><i class="fas fa-journal-whills"></i> Günlük (0)</li>
                    <li id="cat-bir-cumle-count"><i class="fas fa-quote-left"></i> Bir Cümle (0)</li>
                </ul>
            </div>

            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-clock"></i> Son Yazılar
                </div>

                    <li><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</li>
                </ul>
            </div>

            <div class="sidebar-widget">
                <div class="widget-title">
                    <i class="fas fa-share-alt"></i> Takip Et
                </div>
                <div class="social-links">
                    <a href="https://www.instagram.com/esrefakbs" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="https://x.com/esrefakbs" target="_blank" rel="noopener" aria-label="X (Twitter)"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </aside>
    </div>

    <div id="postModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <span class="close-modal" aria-label="Kapat">&times;</span>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        (function() {
            const REPO_OWNER = 'esakbas';
            const REPO_NAME = 'esakbas.github.io';

            let allPosts = [];
            let currentFilter = 'all';
            let currentSearch = '';

            /* ---------- yardımcı fonksiyonlar ---------- */
            function calculateReadingTime(content) {
                const wordsPerMinute = 200;
                const words = (content || '').split(/\s+/).length;
                const minutes = Math.ceil(words / wordsPerMinute);
                return minutes < 1 ? 1 : minutes;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text || '';
                return div.innerHTML;
            }

            function markdownToHtml(md) {
                let html = md || '';
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
                html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
                html = html.replace(/^## (.*$)/gm, '<h2 id="modalTitle">$1</h2>');
                html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
                html = html.split('\n\n').map(para => {
                    if (para.startsWith('<h') || para.startsWith('<pre') || para.startsWith('<ul'))
                        return para;
                    return `<p>${para.replace(/\n/g, '<br>')}</p>`;
                }).join('');
                return html;
            }

            function getCategoryInfo(labels) {
                const category = labels?.[0]?.name || 'edebiyat';
                const map = {
                    edebiyat: { name: 'Edebiyat', icon: '<i class="fas fa-book"></i>', cls: 'category-edebiyat' },
                    siir: { name: 'Şiir', icon: '<i class="fas fa-feather-alt"></i>', cls: 'category-siir' },
                    gunluk: { name: 'Günlük', icon: '<i class="fas fa-journal-whills"></i>', cls: 'category-gunluk' },
                    'bir-cumle': { name: 'Bir Cümle', icon: '<i class="fas fa-quote-left"></i>', cls: 'category-bir-cumle' }
                };
                return map[category] || { name: category, icon: '<i class="fas fa-tag"></i>', cls: '' };
            }

            /* ---------- DOM güncellemeleri ---------- */
            function updateCategoryCounts() {
                const counts = {
                    edebiyat: allPosts.filter(p => p.labels?.some(l => l.name === 'edebiyat')).length,
                    siir: allPosts.filter(p => p.labels?.some(l => l.name === 'siir')).length,
                    gunluk: allPosts.filter(p => p.labels?.some(l => l.name === 'gunluk')).length,
                    'bir-cumle': allPosts.filter(p => p.labels?.some(l => l.name === 'bir-cumle')).length
                };
                document.getElementById('cat-edebiyat-count').innerHTML =
                    `<i class="fas fa-book"></i> Edebiyat (${counts.edebiyat})`;
                document.getElementById('cat-siir-count').innerHTML =
                    `<i class="fas fa-feather-alt"></i> Şiir (${counts.siir})`;
                document.getElementById('cat-gunluk-count').innerHTML =
                    `<i class="fas fa-journal-whills"></i> Günlük (${counts.gunluk})`;
                document.getElementById('cat-bir-cumle-count').innerHTML =
                    `<i class="fas fa-quote-left"></i> Bir Cümle (${counts['bir-cumle']})`;
                document.getElementById('totalPosts').textContent = allPosts.length;
            }

            function updateRecentPosts() {
                const recent = [...allPosts]
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                    .slice(0, 5);
                const container = document.getElementById('recentPosts');

                if (!recent.length) {
                    container.innerHTML = '<li><i class="fas fa-info-circle"></i> Henüz yazı yok</li>';
                    return;
                }

                container.innerHTML = recent.map(post => {
                    const safeTitle = escapeHtml(post.title);
                    return `
                <li>
                  <i class="fas fa-angle-right"></i>
                  <a href="#" data-post-id="${post.id}" class="recent-post-link">${safeTitle}</a>
                </li>`;
                }).join('');
            }

            function displayPosts() {
                const container = document.getElementById('posts');
                let filtered = allPosts;

                if (currentFilter !== 'all') {
                    filtered = filtered.filter(post => post.labels?.some(l => l.name === currentFilter));
                }
                if (currentSearch) {
                    const searchLower = currentSearch.toLowerCase();
                    filtered = filtered.filter(post =>
                        post.title.toLowerCase().includes(searchLower) ||
                        (post.body && post.body.toLowerCase().includes(searchLower))
                    );
                }

                if (!filtered.length) {
                    container.innerHTML =
                        '<div class="post-card">📭 Bu kriterlere uygun yazı bulunamadı.</div>';
                    return;
                }

                container.innerHTML = filtered.map(post => {
                    const { name, icon, cls } = getCategoryInfo(post.labels);
                    const content = post.body || '';
                    const excerpt = content.split('\n').slice(0, 3).join(' ').substring(0, 180) + '...';
                    const date = new Date(post.created_at).toLocaleDateString('tr-TR');
                    const readTime = calculateReadingTime(content);

                    return `
                <article class="post-card" data-post-id="${post.id}">
                  <span class="post-card-link" aria-hidden="true"></span>
                  <div class="post-category ${cls}">${icon} ${name}</div>
                  <h2 class="post-title">${escapeHtml(post.title)}</h2>
                  <div class="post-meta">
                    <span><i class="far fa-calendar-alt"></i> ${date}</span>
                    <span class="reading-time"><i class="far fa-clock"></i> ${readTime} dk okuma</span>
                  </div>
                  <p class="post-excerpt">${escapeHtml(excerpt)}</p>
                  <button class="read-more-btn" data-post-id="${post.id}">
                    Devamını Oku <i class="fas fa-arrow-right"></i>
                  </button>
                </article>`;
                }).join('');
            }

            /* ---------- modal ---------- */
            function openModal(post) {
                const modal = document.getElementById('postModal');
                const modalBody = document.getElementById('modalBody');
                const { name, icon, cls } = getCategoryInfo(post.labels);

                let content = post.body || '';
                content = content.replace(/^## .*\n/, ''); // ilk başlığı kaldır (zaten title'da var)
                content = markdownToHtml(content);
                const readTime = calculateReadingTime(post.body || '');
                const date = new Date(post.created_at).toLocaleDateString('tr-TR');

                modalBody.innerHTML = `
              <div class="post-category ${cls}" style="margin-bottom:1rem;display:inline-flex;">${icon} ${name}</div>
              <h1 id="modalTitle" style="margin-top:1rem;">${escapeHtml(post.title)}</h1>
              <div class="post-meta" style="margin-top:0.5rem;">
                <span><i class="far fa-calendar-alt"></i> ${date}</span>
                <span><i class="far fa-clock"></i> ${readTime} dk okuma</span>
              </div>
              <hr style="margin:1.5rem 0;">
              ${content}
              <hr style="margin:1.5rem 0;">
              <div style="display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;">
                <button id="shareTwitter" style="background:#000;color:white;border:none;padding:0.5rem 1rem;border-radius:50px;cursor:pointer;">
                  <i class="fab fa-twitter"></i> Paylaş
                </button>
                <button id="copyLink" style="background:var(--accent-color);color:white;border:none;padding:0.5rem 1rem;border-radius:50px;cursor:pointer;">
                  <i class="fas fa-link"></i> Kopyala
                </button>
              </div>`;

                // paylaş butonlarına post linkini bağla
                const issueUrl = post.html_url || window.location.href;
                document.getElementById('shareTwitter').onclick = () => {
                    window.open(
                        `https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(issueUrl)}`,
                        '_blank', 'noopener');
                };
                document.getElementById('copyLink').onclick = () => {
                    navigator.clipboard.writeText(issueUrl).then(() => alert('Link kopyalandı!'));
                };

                modal.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                document.getElementById('postModal').style.display = 'none';
                document.body.style.overflow = '';
            }

            /* ---------- veri çekme ---------- */
            async function loadPosts() {
                const container = document.getElementById('posts');
                container.innerHTML = `
              <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
              <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>`;

                try {
                    const response = await fetch(
                        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=all&per_page=100`);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const issues = await response.json();
                    allPosts = issues.filter(issue => issue.labels && issue.labels.length > 0);
                    updateCategoryCounts();
                    updateRecentPosts();
                    displayPosts();
                } catch (err) {
                    container.innerHTML =
                        `<div class="post-card">⚠️ Yazılar yüklenemedi: ${escapeHtml(err.message)}</div>`;
                }
            }

            /* ---------- event delegation ---------- */
            function handleDelegatedClick(e) {
                // kart veya "Devamını Oku" butonu
                const card = e.target.closest('.post-card');
                const readBtn = e.target.closest('.read-more-btn');
                const recentLink = e.target.closest('.recent-post-link');

                let postId = null;
                if (readBtn) postId = readBtn.dataset.postId;
                else if (recentLink) {
                    e.preventDefault();
                    postId = recentLink.dataset.postId;
                } else if (card) {
                    // eğer tıklanan .post-card-link üzerindeyse veya kartın kendisiyse
                    postId = card.dataset.postId;
                }

                if (postId) {
                    const post = allPosts.find(p => p.id.toString() === postId.toString());
                    if (post) openModal(post);
                }
            }

            /* ---------- event listener'lar ---------- */
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value;
                displayPosts();
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                    currentFilter = btn.dataset.category;
                    displayPosts();
                });
            });

            document.addEventListener('click', handleDelegatedClick);

            // modal kapatma
            document.querySelector('.close-modal').addEventListener('click', closeModal);
            window.addEventListener('click', (e) => {
                if (e.target === document.getElementById('postModal')) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && document.getElementById('postModal').style.display === 'block')
                    closeModal();
            });

            // başlat
            loadPosts();
        })();
    </script>
</body>
</html>
