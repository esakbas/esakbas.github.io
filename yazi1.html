<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindiba | Hatıra Defteri</title>

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #212529;
            --muted: #6c757d;
            --accent: #4f46e5;
            --border: #e5e7eb;
            --shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text: #f8fafc;
                --muted: #94a3b8;
                --border: #334155;
                --shadow: 0 10px 20px rgba(0,0,0,0.25);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s, color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--muted);
            margin-top: 0.5rem;
            font-style: italic;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* BLOG */
        .posts {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .post {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .post:hover {
            transform: translateY(-3px);
        }

        .meta {
            font-size: 0.8rem;
            color: var(--muted);
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .excerpt {
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: var(--accent);
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* SIDEBAR */
        aside {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: var(--shadow);
        }

        .box h3 {
            margin-bottom: 0.8rem;
            font-size: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .profile {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 0.8rem;
        }

        .muted {
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Hindiba 🌿</h1>
    <p>Bir hatıra defteri… zamanla dolacak.</p>
</header>

<div class="container">

    <!-- BLOG LİSTESİ -->
    <main class="posts" id="posts"></main>

    <!-- SIDEBAR -->
    <aside>

        <div class="box">
            <h3>Hakkımda</h3>
            <img src="pp.jpg" class="profile">
            <p class="muted">
                Burada yazılarımı, düşüncelerimi ve küçük notlarımı paylaşıyorum.
            </p>
        </div>

        <div class="box">
            <h3>Kategoriler</h3>
            <p class="muted">✒️ Edebiyat</p>
            <p class="muted">📜 Şiir</p>
            <p class="muted">📓 Günlük</p>
        </div>

    </aside>

</div>

<script>
const username = "esakbas";
const repo = "esakbas.github.io";
const folder = "posts";

async function loadPosts() {

    const url = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;
    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById("posts");

    const posts = data
        .filter(f => f.name.endsWith(".md"))
        .reverse();

    for (const post of posts) {

        const content = await fetch(post.download_url).then(r => r.text());

        const title = content.split("\n")[0].replace("#", "").trim();
        const excerpt = content.split("\n").slice(1, 3).join(" ").trim();

        const card = document.createElement("article");
        card.className = "post";

        card.innerHTML = `
            <div class="meta">
                <span>📄 ${post.name}</span>
            </div>
            <div class="title">${title}</div>
            <div class="excerpt">${excerpt}</div>
            <a class="btn" href="${post.download_url}" target="_blank">Devamını Oku</a>
        `;

        container.appendChild(card);
    }
}

loadPosts();
</script>

</body>
</html>
