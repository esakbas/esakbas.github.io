<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yazı</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:#f8fafc;
    padding:2rem;
    line-height:1.8;
}
.container{
    max-width:800px;
    margin:auto;
}
a{color:#4f46e5}
</style>
</head>

<body>

<div class="container">

<a href="index.html">← Geri</a>

<div id="content">Yükleniyor...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const params = new URLSearchParams(location.search);
const file = params.get("file");

async function load(){

if(!file){
document.getElementById("content").innerHTML="Dosya yok";
return;
}

const md = await fetch(file).then(r => r.text());

document.getElementById("content").innerHTML = marked.parse(md);

}

load();
</script>

</body>
</html>
